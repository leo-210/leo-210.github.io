<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <meta property="og:description" content="The official website of Léo-21">

    <meta property="og:title" content="Léo-21">

    <link rel="icon" href="img/favicon.ico">
    <link rel="stylesheet" href="styles/main.css">

    <title>Léo-21</title>
    <script>
        function changeTheme() {
            console.log("ok")
            document.body.classList.toggle("dark-mode");

  <body class="dark-mode">
    <button type="button" class="dark-mode-toggle" onclick="changeTheme()">
      <img src="img/night-mode.png" alt="Dark mode" class="dark-mode-icon">
      <span>Darkmode</span>
    </button>
    <div class="container">
      <section class="about">
        <ul>
          <li>
            <img src="img/logo.png" alt="Logo Léo-21" class="logo">
          </li>
          <li>
            <h1 class="title">Léo-21</h1>
          </li>
        </ul>
        <p>
          Je m'appelle Léo (avec comme pseudo Léo-21) et je suis un
          développeur de 15 ans passionné par l'informatique et les maths.
        </p>
        <div>
          <ul>
            <li><a href="https://discord.com/users/526529532677586954"><img src="img/discord-icon.png" alt="Lien discord"></a></li>
            <li><a href="https://github.com/leo-210"><img src="img/icon-github.png" alt="Lien github"></a></li>
            <li><a href="mailto:leo@leo21.fr"><img src="img/email-icon.png" alt="Mail"></a></li>
          </ul>
        </div>
      </section>
      <section id="projects">
        <h2>Projets</h2>
        <hr>
        <div class="projects">
          <a href="https://discord.gg/tGBKNnnnbN">
            <figure>
              <img src="img/cmfr-logo.png" alt="Logo CMFR Bot">
              <figcaption>
                <h3>CMFrBot</h3>
                <p>
                  CMFrBot est un bot pour le serveur discord
                  Communauté Minecraft Fr.
                </p>
                <button>Rejoindre le serveur</button>
              </figcaption>
            </figure>
          </a>
          <a
            href="https://discord.com/api/oauth2/authorize?client_id=925164519045603338&permissions=2048&scope=bot%20applications.commands&redirect_uri=https://www.leo21.fr&response_type=code">
            <figure>
              <img src="img/calculator-logo.png" alt="Logo Calculator">
              <figcaption>
                <h3>Calculator</h3>
                <p>
                  Calculator est un bot Discord qui vous permet d'avoir une calculatrice
                  dans Discord !
                </p>
                <button>Inviter le bot</button>
              </figcaption>
            </figure>
          </a>
