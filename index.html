<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <meta property="og:description" content="The official website of Léo-21">
    <meta property="og:image" content="https://www.leo21.fr/img/logo.png">
    <meta property="og:title" content="Léo-21">
    <meta name="theme-color" content="#3F51B5">

    <link rel="icon" href="img/favicon.ico">
    <link rel="stylesheet" href="styles/main.css">

    <title>Léo-21</title>

    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/js-cookie@3.0.1/dist/js.cookie.min.js"></script>
    <script src="js/index.js"></script>
  </head>
  <body class="dark-mode">
    <button type="button" class="dark-mode-toggle" onclick="changeTheme()">
      <img src="img/night-mode.png" alt="Dark mode" class="dark-mode-icon">
      <span>Night mode</span>
    </button>
    <button type="button" class="lang-switch" onclick="onLangSwitchClick()">🇬🇧</button>
    <div class="container">
      <section class="about">
        <ul>
          <li>
            <img src="img/logo.png" alt="Logo Léo-21" class="logo">
          </li>
          <li>
            <h1 class="title">Léo-21</h1>
          </li>
        </ul>
        <p lang="en">
          My name is Léo (with the nickname Léo-21) and I and a 15 years
          old developer, passionate about computer science and mathematics.
        </p>
        <p lang="fr">
          Je m'appelle Léo (avec comme pseudo Léo-21) et je suis un
          développeur de 15 ans passionné par l'informatique et les maths.
        </p>
        <div>
          <ul>
            <li><a href="https://discord.com/users/526529532677586954"><img src="img/discord-icon.png" alt="Discord link"></a></li>
            <li><a href="https://github.com/leo-210"><img src="img/icon-github.png" alt="GitHub Link"></a></li>
            <li><a href="mailto:leo@leo21.fr"><img src="img/email-icon.png" alt="email"></a></li>
          </ul>
        </div>
      </section>
      <section id="projects">
        <h2 lang="fr">Projets</h2>
        <h2 lang="en">Projects</h2>
        <hr>
        <div class="projects">
          <a href="https://discord.gg/tGBKNnnnbN">
            <figure>
              <img src="img/cmfr-logo.png" alt="Logo CMFr Bot">
              <figcaption>
                <h3>CMFrBot</h3>
                <p lang="en">
                  CMFrBot is a bot for the french Discord server
                  Communauté Minecraft Fr.
                </p>
                <p lang="fr">
                  CMFrBot est un bot pour le serveur discord
                  Communauté Minecraft Fr.
                </p>
                <button lang="en">Join the server</button>
                <button lang="fr">Rejoindre le serveur</button>
              </figcaption>
            </figure>
          </a>
          <a
            href="https://discord.com/api/oauth2/authorize?client_id=925164519045603338&permissions=2048&scope=bot%20applications.commands&redirect_uri=https://www.leo21.fr&response_type=code">
            <figure>
              <img src="img/calculator-logo.png" alt="Logo Calculator">
              <figcaption>
                <h3>Calculator</h3>
                <p lang="en">
                  Calculator is a Discord bot that allows you to have a calculator
                  in Discord !
                </p>
                <p lang="fr">
                  Calculator est un bot Discord qui vous permet d'avoir une calculatrice
                  dans Discord !
                </p>
                <button lang="en">Invite the bot</button>
                <button lang="fr">Inviter le bot</button>
              </figcaption>
            </figure>
          </a>
        </div>
      </section>
    </div>
  </body>
</html>
